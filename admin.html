<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coin Flip Admin</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0f0f1a; color: #e8e8f0; font-family: 'Segoe UI', sans-serif; padding: 40px 24px; }
    h1 { color: #f0c040; font-size: 1.5rem; margin-bottom: 24px; }
    .auth-row { display: flex; gap: 10px; align-items: center; margin-bottom: 28px; flex-wrap: wrap; }
    .auth-row label { font-size: 0.82rem; color: #888; }
    input[type="password"], input[type="text"] {
      background: #1a1a2e; border: 1px solid #3a3a60; border-radius: 8px;
      color: #e8e8f0; padding: 8px 12px; font-size: 0.95rem; outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #f0c040; }
    .btn {
      background: linear-gradient(135deg, #f0c040, #c8900a);
      border: none; border-radius: 8px; padding: 8px 18px;
      font-weight: 700; font-size: 0.9rem; color: #1a1000; cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.88; }
    .btn.green { background: linear-gradient(135deg, #40e090, #20a060); color: #001a0a; }
    .btn.small { padding: 5px 12px; font-size: 0.8rem; }
    table { width: 100%; max-width: 700px; border-collapse: collapse; }
    th { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.1em; color: #555; padding: 8px 12px; text-align: left; border-bottom: 1px solid #1e1e38; }
    td { padding: 10px 12px; border-bottom: 1px solid #141428; font-size: 0.9rem; }
    .has-life { color: #40e090; font-size: 0.8rem; font-weight: 600; }
    .no-life { color: #444; font-size: 0.8rem; }
    .msg { margin-top: 12px; font-size: 0.85rem; color: #40e090; min-height: 1.2em; }
    .msg.err { color: #e04060; }
    .grant-form { display: flex; gap: 10px; align-items: center; margin-bottom: 20px; flex-wrap: wrap; }
    .section-title { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.1em; color: #555; margin-bottom: 10px; }
  </style>
</head>
<body>

<h1>🪙 Coin Flip Admin</h1>

<div class="auth-row">
  <label>Admin Secret</label>
  <input type="password" id="secret" placeholder="Enter secret" />
  <button class="btn" onclick="load()">Load Players</button>
</div>

<div id="panel" style="display:none">
  <div class="section-title">Global actions</div>
  <div style="margin-bottom:20px">
    <button class="btn" style="background:linear-gradient(135deg,#e04060,#a02040);color:#fff" onclick="globalReset()">🔄 Clear All Cooldowns</button>
  </div>
  <div class="section-title">Manual score entry (for testing)</div>
  <div class="grant-form" style="margin-bottom:20px">
    <input type="text" id="testName" placeholder="Player name" />
    <input type="number" id="testScore" placeholder="Score" style="width:80px" />
    <button class="btn small" onclick="addScore()">Add Score</button>
  </div>
  <div class="section-title">Grant extra coin to a specific player</div>
  <div class="grant-form">
    <input type="text" id="manualName" placeholder="Player name" />
    <button class="btn green small" onclick="grantManual()">Grant Coin</button>
  </div>

  <div class="section-title">All players</div>
  <table>
    <thead>
      <tr>
        <th>#</th>
        <th>Name</th>
        <th>High Score</th>
        <th>Extra Coin</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
  <div class="msg" id="msg"></div>
</div>

<script>
  let lifeSet = new Set();

  async function load() {
    const secret = document.getElementById('secret').value;
    try {
      const [scoresRes, livesRes] = await Promise.all([
        fetch('/api/scores?limit=100'),
        fetch(`/api/all-lives?secret=${encodeURIComponent(secret)}`)
      ]);
      if (livesRes.status === 403) { showMsg('Wrong secret.', true); return; }
      const scores = await scoresRes.json();
      const lives  = await livesRes.json();
      lifeSet = new Set(lives.map(l => l.name.toLowerCase()));
      renderTable(scores);
      document.getElementById('panel').style.display = 'block';
    } catch(e) { showMsg('Failed to load: ' + e.message, true); }
  }

  function renderTable(scores) {
    const tbody = document.getElementById('tbody');
    if (!scores.length) { tbody.innerHTML = '<tr><td colspan="5" style="color:#444">No players yet</td></tr>'; return; }
    tbody.innerHTML = scores.map((s, i) => {
      const has = lifeSet.has(s.name.toLowerCase());
      return `<tr>
        <td style="color:#555">${i + 1}</td>
        <td>${esc(s.name)}</td>
        <td style="color:#f0c040;font-weight:700">${s.score}</td>
        <td>${has ? '<span class="has-life">✓ Granted</span>' : '<span class="no-life">—</span>'}</td>
        <td>${has ? '' : `<button class="btn green small" onclick="grant('${esc(s.name)}')">Grant Coin</button>`}</td>
      </tr>`;
    }).join('');
  }

  async function addScore() {
    const name  = document.getElementById('testName').value.trim();
    const score = parseInt(document.getElementById('testScore').value);
    if (!name || isNaN(score)) { showMsg('Enter a name and score', true); return; }
    try {
      const res  = await fetch('/api/scores', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, score })
      });
      const data = await res.json();
      if (data.ok) { showMsg(`✓ Score added: ${name} → ${score}`); load(); }
      else showMsg(data.error, true);
    } catch(e) { showMsg('Error: ' + e.message, true); }
  }

  async function globalReset() {
    if (!confirm('This will clear the cooldown for ALL players. Continue?')) return;
    const secret = document.getElementById('secret').value;
    try {
      const res  = await fetch('/api/global-reset', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ secret })
      });
      const data = await res.json();
      if (data.ok) showMsg('✓ All cooldowns cleared — players can flip again immediately');
      else showMsg(data.error, true);
    } catch(e) { showMsg('Error: ' + e.message, true); }
  }

  async function grant(name) {
    const secret = document.getElementById('secret').value;
    try {
      const res  = await fetch('/api/grant-life', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, secret })
      });
      const data = await res.json();
      if (data.ok) { showMsg(`✓ Extra coin granted to "${name}"`); load(); }
      else showMsg(data.error, true);
    } catch(e) { showMsg('Error: ' + e.message, true); }
  }

  async function grantManual() {
    const name = document.getElementById('manualName').value.trim();
    if (!name) return;
    await grant(name);
    document.getElementById('manualName').value = '';
  }

  function showMsg(text, isErr) {
    const el = document.getElementById('msg');
    el.textContent = text;
    el.className = 'msg' + (isErr ? ' err' : '');
    setTimeout(() => el.textContent = '', 4000);
  }

  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  document.getElementById('secret').addEventListener('keydown', e => { if (e.key === 'Enter') load(); });
</script>
</body>
</html>
